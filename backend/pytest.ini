[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing:skip-covered
    --cov-report=html
    --cov-report=json
    --cov-branch
    # Enforce the true current coverage floor so the gate is real (was 70,
    # which the suite never met — a fictional gate nothing ran). Ratchet up.
    --cov-fail-under=35
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    fixture: Tests for pytest fixtures
