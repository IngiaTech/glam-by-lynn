name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: glamuser
          POSTGRES_PASSWORD: glampassword
          POSTGRES_DB: glam_by_lynn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U glamuser -d glam_by_lynn_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://glamuser:glampassword@localhost:5432/glam_by_lynn_test
      DATABASE_URL: postgresql://glamuser:glampassword@localhost:5432/glam_by_lynn_test
      SECRET_KEY: ci-test-secret-key-not-used-in-production-000000
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

  frontend:
    name: Frontend (lint, type-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      # Build-time placeholders; real values come from Vercel at deploy time.
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: https://glambylynn.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Advisory for now: the repo has a pre-existing lint backlog
      # (mostly no-explicit-any). Reports issues without failing the build;
      # promote to a hard gate once the backlog is cleared.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
